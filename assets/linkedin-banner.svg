<svg width="1584" height="396" viewBox="0 0 1584 396" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="accent" gradientUnits="userSpaceOnUse" x1="360" y1="0" x2="1230" y2="0">
      <stop offset="0" stop-color="#25f4a7"/>
      <stop offset="1" stop-color="#36d7ff"/>
    </linearGradient>
    <linearGradient id="accentTop" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#25f4a7"/>
      <stop offset="1" stop-color="#36d7ff"/>
    </linearGradient>
    <radialGradient id="glowG" cx="20%" cy="30%" r="60%">
      <stop offset="0" stop-color="#25f4a7" stop-opacity="0.15"/>
      <stop offset="1" stop-color="#25f4a7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowC" cx="85%" cy="20%" r="60%">
      <stop offset="0" stop-color="#36d7ff" stop-opacity="0.15"/>
      <stop offset="1" stop-color="#36d7ff" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#25f4a7" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1584" height="396" fill="#0a0e12"/>
  <rect width="1584" height="396" fill="url(#grid)"/>
  <rect width="1584" height="396" fill="url(#glowG)"/>
  <rect width="1584" height="396" fill="url(#glowC)"/>
  <!-- Top accent bar -->
  <rect x="0" y="0" width="1584" height="6" fill="url(#accentTop)"/>

  <!-- Terminal dots (top-right) -->
  <circle cx="1486" cy="48" r="6" fill="#ff5f56"/>
  <circle cx="1506" cy="48" r="6" fill="#ffbd2e"/>
  <circle cx="1526" cy="48" r="6" fill="#27c93f"/>

  <!-- Faded prompt motif (right) -->
  <text x="1545" y="350" font-family="'Menlo','Courier New',monospace" font-size="170" font-weight="700"
        fill="#25f4a7" fill-opacity="0.05" text-anchor="end">&gt;_</text>

  <!-- Status pill (centered) -->
  <rect x="540" y="48" width="504" height="36" rx="18" fill="#25f4a7" fill-opacity="0.06" stroke="#25f4a7" stroke-opacity="0.35"/>
  <circle cx="568" cy="66" r="5.5" fill="#25f4a7"/>
  <text x="588" y="71" font-family="'Menlo','Courier New',monospace" font-size="15" letter-spacing="2"
        fill="#25f4a7">OPEN TO CYBERSECURITY / SOC / DFIR ROLES</text>

  <!-- Headline -->
  <text x="792" y="172" text-anchor="middle" font-family="'Helvetica Neue','Arial',sans-serif"
        font-size="54" font-weight="800" letter-spacing="-1">
    <tspan fill="#eaf2f8">Cybersecurity</tspan><tspan dx="22" fill="url(#accent)">&amp; Incident Response</tspan>
  </text>

  <!-- Subline -->
  <text x="792" y="220" text-anchor="middle" font-family="'Menlo','Courier New',monospace"
        font-size="20" fill="#36d7ff">SOC · Threat Detection · Vuln Mgmt · Cloud Security · Digital Forensics</text>

  <!-- Divider -->
  <rect x="692" y="240" width="200" height="3" rx="1.5" fill="url(#accent)"/>

  <!-- Tool chips (centered row) -->
  <g font-family="'Menlo','Courier New',monospace" font-size="16" fill="#cdd9e3">
    <rect x="352" y="278" width="110" height="40" rx="8" fill="#111a22" stroke="#25394a"/>
    <text x="407" y="304" text-anchor="middle">Splunk</text>

    <rect x="476" y="278" width="200" height="40" rx="8" fill="#111a22" stroke="#25394a"/>
    <text x="576" y="304" text-anchor="middle">Microsoft Sentinel</text>

    <rect x="690" y="278" width="130" height="40" rx="8" fill="#111a22" stroke="#25394a"/>
    <text x="755" y="304" text-anchor="middle">Wireshark</text>

    <rect x="834" y="278" width="110" height="40" rx="8" fill="#111a22" stroke="#25394a"/>
    <text x="889" y="304" text-anchor="middle">Nessus</text>

    <rect x="958" y="278" width="90" height="40" rx="8" fill="#111a22" stroke="#25394a"/>
    <text x="1003" y="304" text-anchor="middle">AWS</text>

    <rect x="1062" y="278" width="170" height="40" rx="8" fill="#111a22" stroke="#25394a"/>
    <text x="1147" y="304" text-anchor="middle">MITRE ATT&amp;CK</text>
  </g>

  <!-- Portfolio URL -->
  <text x="792" y="360" text-anchor="middle" font-family="'Menlo','Courier New',monospace"
        font-size="18" fill="#54677a"><tspan fill="#25f4a7">$</tspan> burravigneswarareddy.github.io/dfir-portfolio</text>
</svg>
